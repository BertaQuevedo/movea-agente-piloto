
<style>
*{box-sizing:border-box;margin:0;padding:0}
.shell{display:flex;flex-direction:column;height:560px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary)}
.hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.av{width:36px;height:36px;border-radius:50%;background:#1D9E75;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#fff;flex-shrink:0}
.av-sm{width:28px;height:28px;border-radius:50%;background:#1D9E75;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#fff;flex-shrink:0;align-self:flex-end}
.hdr-info p{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.hdr-info span{font-size:12px;color:var(--color-text-secondary)}
.dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;margin-left:auto}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;gap:8px;max-width:88%}
.msg.u{align-self:flex-end;flex-direction:row-reverse}
.msg.a{align-self:flex-start}
.bbl{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.55;color:var(--color-text-primary);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.msg.u .bbl{background:#1D9E75;color:#fff;border-color:transparent;border-radius:16px 16px 4px 16px}
.msg.a .bbl{border-radius:16px 16px 16px 4px}
.bbl.escalado{background:#FAECE7;border-color:#F0997B;color:#712B13}
.bbl.escalado-urgent{background:#FCEBEB;border-color:#F09595;color:#791F1F}
.typing-bbl{padding:12px 14px;display:flex;gap:4px;align-items:center}
.typing-bbl span{width:6px;height:6px;border-radius:50%;background:var(--color-text-secondary);animation:bounce 1.1s infinite}
.typing-bbl span:nth-child(2){animation-delay:.2s}
.typing-bbl span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.ibar{display:flex;gap:8px;padding:12px 16px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.ibar input{flex:1;padding:9px 14px;border-radius:20px;font-size:13px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
.ibar input:focus{border-color:#1D9E75}
.sbtn{width:36px;height:36px;border-radius:50%;border:none;background:#1D9E75;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.sbtn:hover{background:#0F6E56}
.sbtn:disabled{background:var(--color-border-secondary);cursor:not-allowed}
.topbar{display:flex;align-items:center;margin-bottom:10px;padding:0 2px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#E1F5EE;color:#085041;margin-left:8px}
.rbtn{font-size:12px;color:var(--color-text-secondary);background:none;border:none;cursor:pointer;text-decoration:underline;margin-left:auto}
.rbtn:hover{color:var(--color-text-primary)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.chip:hover{border-color:#1D9E75;color:#085041;background:#E1F5EE}
</style>

<h2 class="sr-only">Agente piloto Movea Fisio y Osteo v5</h2>

<div class="topbar">
  <span style="font-size:13px;color:var(--color-text-secondary)">Agente piloto · datos ficticios · entorno de prueba</span>
  <span class="badge">PILOTO v5</span>
  <button class="rbtn" onclick="reset()">reiniciar</button>
</div>

<div class="shell">
  <div class="hdr">
    <div class="av">MF</div>
    <div class="hdr-info">
      <p>Movea Fisio &amp; Osteo</p>
      <span>Asistente virtual · Bilbao</span>
    </div>
    <div class="dot"></div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="ibar">
    <input id="inp" type="text" placeholder="Escribe tu consulta..." maxlength="300" />
    <button class="sbtn" id="sbtn" onclick="send()" aria-label="Enviar">
      <i class="ti ti-send" style="font-size:16px" aria-hidden="true"></i>
    </button>
  </div>
</div>

<div class="chips" id="chips"></div>

<script>
const SCENARIOS = [
  "Quiero pedir cita, me duele la espalda",
  "Me opere hace 10 dias y la herida me duele mucho",
  "Trabajais con ninos? cuanto cuesta?",
  "Tengo hormigueos en el brazo y no puedo moverlo",
  "Quiero hablar con una persona",
  "Tengo dolor de hombro, es un desgarro?"
];

let state = { step: null, nombre: null, tel: null, trat: null, intentos: 0 };

function match(txt, patterns) {
  return patterns.some(p => p.test(txt));
}

function isUrgencia(t) {
  return match(t, [
    /dolor\s*(muy\s*|bastante\s*|super\s*)?intenso/i,
    /insoportable/i,
    /hormigueo/i,
    /no\s*puedo\s*mover/i,
    /oper[eé]\s*(hace|el|ayer|hoy|\d)/i,
    /me\s*(han\s*)?operad/i,
    /herida\s*(me\s*)?(duele|est[aá])/i,
    /duele.*herida/i,
    /(herida|cicatriz).*(caliente|roja|infectada|peor|mal)/i,
    /fiebre\s*(y|con)\s*dolor/i,
    /traumatismo/i,
    /accidente/i,
    /p[eé]rdida\s*de\s*fuerza/i,
    /no\s*siento\s*(el|la|nada)/i,
    /entumecid/i,
    /dificultad.*respirar/i,
  ]);
}

function isDiagnostico(t) {
  return match(t, [
    /desgarro/i,
    /es\s*una?\s*(hernia|rotura|esguince|tendinitis|bursitis|contractura|lesion|lesi[oó]n|fractura)/i,
    /tengo\s*(una?\s*)?(hernia|rotura|desgarro|fractura)/i,
    /qu[eé]\s*(me\s*)?(tengo|pasa|es\s*esto)/i,
    /por\s*qu[eé]\s*me\s*duele/i,
    /diagn[oó]stico/i,
    /ser[aá]\s*una?\s*(hernia|rotura|desgarro)/i,
  ]);
}

function isSolicitudHumano(t) {
  return match(t, [
    /hablar\s*con\s*(una?\s*)?(persona|alguien|vosotros|el\s*equipo|fisio)/i,
    /persona\s*real/i,
    /queja/i,
    /reclamaci[oó]n/i,
    /mal\s*servicio/i,
  ]);
}

function isReserva(t) {
  return match(t, [
    /(pedir|reservar|quiero)\s*(una\s*)?(cita|hora|turno|visita)/i,
    /cita\s*(para|en)/i,
    /necesito\s*(una\s*)?cita/i,
  ]);
}

function responder(txt) {

  // GUARDIA DE ESTADO: si hay un flujo activo, solo la urgencia puede interrumpirlo
  if (state.step) {
    // Urgencia interrumpe cualquier flujo
    if (isUrgencia(txt)) {
      state = { step: null, nombre: null, tel: null, trat: null, intentos: 0 };
      return {
        text: "Lo que me describes necesita atención urgente. Por favor llama ahora al 944 12 34 56. Si la situación es muy urgente, acude directamente a urgencias.",
        tipo: 'escalado-urgent'
      };
    }
    // Flujo de reserva en curso: continuar
    if (state.step.startsWith('res_')) return flujoReserva(txt);
    // Flujo de escalado en curso: continuar
    if (state.step.startsWith('esc_')) return flujoEscalado(txt);
  }

  // Sin flujo activo: evaluar todos los patrones en orden de prioridad
  if (isUrgencia(txt)) {
    state = { step: null, nombre: null, tel: null, trat: null, intentos: 0 };
    return {
      text: "Lo que me describes necesita atención urgente. Por favor llama ahora al 944 12 34 56. Si la situación es muy urgente, acude directamente a urgencias.",
      tipo: 'escalado-urgent'
    };
  }

  if (isDiagnostico(txt)) {
    return {
      text: "Entiendo que esa molestia te preocupa. Para saber exactamente qué está pasando necesitas una valoración presencial con nuestro fisioterapeuta, que explorará el movimiento y los tejidos. Yo no puedo darte un diagnóstico desde aquí.\n\nLo que sí puedo hacer es ayudarte a reservar una primera valoración (45 €, 60 min) donde el equipo analiza tu caso a fondo. ¿Te ayudo a pedir cita?"
    };
  }

  if (isSolicitudHumano(txt)) {
    state.step = 'esc_nombre';
    return {
      text: "Entiendo que esto es importante. Voy a conectarte con una persona del equipo para que pueda ayudarte directamente. ¿Me confirmas tu nombre completo?",
      tipo: 'escalado'
    };
  }

  if (isReserva(txt)) {
    state.step = 'res_nombre';
    state.intentos = 0;
    return { text: "Claro, te ayudo a reservar ahora mismo. ¿Me dices tu nombre completo?" };
  }

  if (/ni[nñ]o|infantil|beb[eé]|adolescente/i.test(txt)) {
    return { text: "Sí, estamos especializados en fisioterapia y osteopatía infantil para bebés, niños y adolescentes. La sesión cuesta 50 € (45 min). Para menores de 14 años es necesaria la presencia de un adulto responsable. ¿Quieres reservar una cita?" };
  }
  if (/precio|cuanto cuesta|cuánto|tarifa|coste/i.test(txt)) {
    return { text: "Nuestras tarifas:\n• Primera valoración: 45 €\n• Fisioterapia general: 55 €/sesión\n• Osteopatía: 65 €/sesión\n• Fisio deportiva: 60 €/sesión\n• Infantil: 50 €/sesión\n• Bonos de 5 sesiones con descuento\n\n¿Te ayudo a elegir el más adecuado?" };
  }
  if (/horario|cu[aá]ndo abr|cuando abr/i.test(txt)) {
    return { text: "Nuestro horario:\n• Lunes a viernes: 9:00–20:00\n• Sábados: 10:00–14:00\n• Domingos y festivos: cerrado\n\n¿Quieres reservar una cita?" };
  }
  if (/d[oó]nde|direcci[oó]n|ubicaci[oó]n|c[oó]mo llegar|metro/i.test(txt)) {
    return { text: "Estamos en Calle Autonomía 34, 1º izquierda, 48012 Bilbao. A 5 minutos del metro Indautxu (líneas 1 y 2). Parking público a 200 metros. ¿Necesitas algo más?" };
  }
  if (/cancelar|cancelaci[oó]n|cambiar\s*cita/i.test(txt)) {
    return { text: "Puedes cancelar o cambiar tu cita avisando con al menos 24 horas al 944 12 34 56 o por WhatsApp. Cancelaciones con menos de 24h pueden llevar un cargo del 50%. ¿Hay algo más?" };
  }
  if (/seguro|mutua|aseguradora/i.test(txt)) {
    return { text: "Trabajamos solo con pacientes particulares, sin convenio con seguros ni mutuas. Aceptamos efectivo, tarjeta, Bizum y transferencia (para bonos). ¿Necesitas más información?" };
  }
  if (/deport|f[uú]tbol|p[aá]del|running|ciclismo|crossfit/i.test(txt)) {
    return { text: "Tenemos fisioterapia deportiva especializada para amateurs y profesionales: lesiones, sobrecargas, esguinces y prevención. 60 min, 60 €. ¿Quieres reservar una valoración?" };
  }
  if (/osteopat/i.test(txt)) {
    return { text: "La osteopatía trata dolores crónicos, cefaleas y bloqueos articulares con técnicas manuales suaves. 60 min, 65 €. Bono 5 sesiones: 290 €. ¿Te ayudo a pedir cita?" };
  }
  if (/gracias|muchas gracias|perfecto|genial/i.test(txt)) {
    return { text: "De nada, ha sido un placer. Si necesitas cualquier otra cosa, aquí estaremos. ¡Hasta pronto!" };
  }

  state.intentos = (state.intentos || 0) + 1;
  if (state.intentos >= 2) {
    state.intentos = 0;
    state.step = 'esc_nombre';
    return {
      text: "Veo que no estoy resolviendo bien tu consulta. Voy a conectarte con una persona del equipo. ¿Me dices tu nombre completo?",
      tipo: 'escalado'
    };
  }
  return { text: "Entiendo tu consulta. Puedo ayudarte con citas, tratamientos, horarios y precios. ¿Qué necesitas exactamente?" };
}

function flujoReserva(txt) {
  if (state.step === 'res_nombre') {
    state.nombre = txt.trim();
    state.step = 'res_tel';
    return { text: `Perfecto, ${state.nombre}. ¿Cuál es tu teléfono de contacto?` };
  }
  if (state.step === 'res_tel') {
    state.tel = txt.trim();
    state.step = 'res_trat';
    return { text: `Anotado. ¿Qué tipo de tratamiento buscas o cuál es tu motivo de consulta?` };
  }
  if (state.step === 'res_trat') {
    state.trat = txt.trim();
    state.step = 'res_horario';
    return { text: `Entendido. ¿Prefieres cita de mañana (9:00–14:00) o de tarde (14:00–20:00)?` };
  }
  if (state.step === 'res_horario') {
    const h = /tarde|pm/i.test(txt) ? 'tarde (14:00–20:00)' : /ma[nñ]ana|am/i.test(txt) ? 'mañana (9:00–14:00)' : txt.trim();
    state.step = null;
    return {
      text: `Perfecto, ${state.nombre}. Ya tengo todo:\n• Tratamiento: ${state.trat}\n• Horario: ${h}\n• Teléfono: ${state.tel}\n\nEl equipo de Movea te llamará en breve para confirmar la cita concreta. ¿Hay algo más en lo que pueda ayudarte?`
    };
  }
}

function flujoEscalado(txt) {
  if (state.step === 'esc_nombre') {
    state.nombre = txt.trim();
    state.step = 'esc_tel';
    return { text: `Gracias, ${state.nombre}. ¿Cuál es tu teléfono de contacto?`, tipo: 'escalado' };
  }
  if (state.step === 'esc_tel') {
    state.tel = txt.trim();
    state.step = null;
    return {
      text: `Anotado. El equipo de Movea te contactará en menos de 2 horas (L–V 9:00–20:00, sábados 10:00–14:00). Si es urgente llama al 944 12 34 56.`,
      tipo: 'escalado'
    };
  }
}

function addMsg(role, text, tipo) {
  const c = document.getElementById('msgs');
  const w = document.createElement('div');
  w.className = 'msg ' + (role === 'u' ? 'u' : 'a');
  if (role === 'a') {
    const av = document.createElement('div');
    av.className = 'av-sm'; av.textContent = 'MF';
    w.appendChild(av);
  }
  const b = document.createElement('div');
  b.className = 'bbl' + (tipo ? ' ' + tipo : '');
  b.style.whiteSpace = 'pre-line';
  b.textContent = text;
  w.appendChild(b);
  c.appendChild(w);
  c.scrollTop = c.scrollHeight;
}

function showTyping() {
  const c = document.getElementById('msgs');
  const w = document.createElement('div');
  w.className = 'msg a'; w.id = 'typ';
  const av = document.createElement('div');
  av.className = 'av-sm'; av.textContent = 'MF';
  const b = document.createElement('div');
  b.className = 'bbl typing-bbl';
  b.innerHTML = '<span></span><span></span><span></span>';
  w.appendChild(av); w.appendChild(b);
  c.appendChild(w); c.scrollTop = c.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typ'); if(t) t.remove(); }

function send() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  addMsg('u', txt);
  document.getElementById('sbtn').disabled = true;
  showTyping();
  setTimeout(() => {
    removeTyping();
    const r = responder(txt);
    addMsg('a', r.text, r.tipo || '');
    document.getElementById('sbtn').disabled = false;
    document.getElementById('inp').focus();
  }, 600 + Math.random() * 400);
}

function reset() {
  state = { step: null, nombre: null, tel: null, trat: null, intentos: 0 };
  document.getElementById('msgs').innerHTML = '';
  addMsg('a', '¡Hola! Bienvenido/a a Movea Fisio & Osteo. Soy el asistente virtual de la clínica y puedo ayudarte con citas, tratamientos, horarios o dudas frecuentes. ¿Qué necesitas hoy?');
}

document.getElementById('inp').addEventListener('keydown', e => { if(e.key === 'Enter') send(); });

addMsg('a', '¡Hola! Bienvenido/a a Movea Fisio & Osteo. Soy el asistente virtual de la clínica y puedo ayudarte con citas, tratamientos, horarios o dudas frecuentes. ¿Qué necesitas hoy?');

const chipsEl = document.getElementById('chips');
SCENARIOS.forEach(s => {
  const ch = document.createElement('button');
  ch.className = 'chip';
  ch.textContent = s;
  ch.onclick = () => { document.getElementById('inp').value = s; send(); };
  chipsEl.appendChild(ch);
});
</script>
